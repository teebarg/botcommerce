services:
  # -----------------------------------
  # Shop API
  # -----------------------------------
  api-shop:
    image: shop-backend:${TAG-latest}
    labels:
      - traefik.enable=true
      - traefik.docker.network=dev-net
      - traefik.http.services.shop-backend.loadbalancer.server.port=8000
      - traefik.http.routers.shop-backend.rule=Host(`api-shop.localhost`)
      - traefik.http.routers.shop-backend.entrypoints=http
    networks:
      - dev-net
    env_file:
      - ./backend/.env.docker
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        INSTALL_DEV: ${INSTALL_DEV-false}
    platform: linux/amd64 # Patch for M1 Mac
    depends_on:
      - db-shop
    command: ["fastapi", "run", "--reload", "app/main.py"]
    volumes:
      - ./backend/:/app
      - /app/.venv

  # -----------------------------------
  # Shared Agent service
  # -----------------------------------
  agent:
    image: shop-agent:${TAG-latest}
    build:
      context: ./agent
      dockerfile: Dockerfile.dev
    networks:
      - dev-net
    labels:
      - traefik.enable=true
      - traefik.http.services.agent.loadbalancer.server.port=8000
      - traefik.http.routers.agent-http.rule=Host(`agent.localhost`)
      - traefik.http.routers.agent-http.entrypoints=http
    depends_on:
      - redis
      - qdrant
      - db-shop
    environment:
      - FASTEMBED_CACHE_PATH=/app/models
    volumes:
      - ./agent:/app
      - /app/.venv
    command: fastapi run --reload app/main.py

networks:
  dev-net:
    external: true